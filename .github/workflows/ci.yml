name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: WorkJ0urnal42
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'WorkJ0urnal42' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ConnectionStrings__WorkJournal: Server=localhost,1433;Initial Catalog=WorkJournalIntegrationTests;User ID=sa;Password=WorkJ0urnal42;Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=False;Connection Timeout=30;

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'WorkJ0urnal42' -C -Q "SELECT 1" && exit 0
            echo "Waiting for SQL Server..."
            sleep 2
          done
          echo "SQL Server did not become ready in time."
          exit 1

      - name: Create test database
        run: |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'WorkJ0urnal42' -C -Q "IF DB_ID('WorkJournalIntegrationTests') IS NULL CREATE DATABASE WorkJournalIntegrationTests;"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        shell: bash
        run: |
          set -euo pipefail

          if find . -name "*Tests.csproj" | grep -q .; then
            dotnet test --no-build --configuration Release
          else
            echo "No test projects found. Skipping tests."
          fi

      - name: Publish app
        run: dotnet publish ./WorkJournalApi/WorkJournalApi.csproj --no-build --configuration Release --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: workjournal-api-publish
          path: ./publish
          