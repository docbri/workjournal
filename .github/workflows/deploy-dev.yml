name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: workjournal-dev-docbri
  RESOURCE_GROUP: workjournal-dev-rg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        shell: bash
        run: |
          set -euo pipefail

          if find . -name "*Tests.csproj" | grep -q .; then
            dotnet test --no-build --configuration Release
          else
            echo "No test projects found. Skipping tests."
          fi

      - name: Publish app
        run: dotnet publish ./WorkJournalApi/WorkJournalApi.csproj --no-build --configuration Release --output ./publish

      - name: Create zip package
        run: |
          cd ./publish
          zip -r ../workjournal-api.zip .

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --src-path ./workjournal-api.zip \
            --type zip
          